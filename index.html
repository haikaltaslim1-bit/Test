<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpenRouter Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8e8;--text2:#777;--text3:#444;
  --accent:#e8ff5a;--accent-dim:rgba(232,255,90,0.12);--accent-glow:rgba(232,255,90,0.25);
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--accent);flex-shrink:0}

.model-sel-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:180px}
.lbl{color:var(--text3);font-size:11px;white-space:nowrap}
select.model-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;outline:none;cursor:pointer;flex:1;max-width:320px}
select.model-sel:focus{border-color:var(--accent)}
select.model-sel option{background:#111}

.key-wrap{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.key-wrap input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none;width:200px;transition:border .2s}
.key-wrap input:focus{border-color:var(--accent)}
.key-wrap input.valid{border-color:#4ade80}
.key-wrap input.invalid{border-color:#f87171}
.bico{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);cursor:pointer;padding:5px 7px;font-size:13px;line-height:1;transition:all .15s}
.bico:hover{background:var(--bg4);color:var(--text)}

.shell{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:200px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sidebar.collapsed{width:0;overflow:hidden}
.sb-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.btn-new{background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:5px;color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:11px;padding:4px 8px;transition:all .15s;white-space:nowrap}
.btn-new:hover{background:var(--accent);color:#000}
.conv-list{flex:1;overflow-y:auto;padding:5px}
.conv-item{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .12s;display:flex;align-items:center;gap:5px;user-select:none}
.conv-item:hover{background:var(--bg3);color:var(--text)}
.conv-item.active{background:var(--accent-dim);color:var(--accent)}
.conv-del{margin-left:auto;opacity:0;font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 2px;flex-shrink:0;transition:opacity .1s}
.conv-item:hover .conv-del{opacity:1}
.conv-del:hover{color:#f87171}

/* Chat main */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

.sysprompt-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0;overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s}
.sysprompt-bar.open{max-height:160px;padding:10px 18px}
.sysprompt-bar textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;outline:none;resize:none;height:80px;line-height:1.6}
.sysprompt-bar textarea:focus{border-color:var(--accent)}
.sys-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}

.params-panel{display:flex;align-items:center;gap:12px;flex-wrap:wrap;overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s;padding:0 18px;background:var(--bg)}
.params-panel.open{max-height:50px;padding:6px 18px}
.pg{display:flex;align-items:center;gap:5px}
.param-input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 8px;outline:none;width:70px}
.param-input:focus{border-color:var(--accent)}

.messages{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.msg{padding:12px 24px;display:flex;gap:12px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.user{background:var(--bg2)}
.msg.assistant{background:var(--bg)}
.msg-av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.msg.user .msg-av{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow)}
.msg.assistant .msg-av{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.msg-body{flex:1;min-width:0}
.msg-role{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.msg.user .msg-role{color:var(--accent)}
.msg.assistant .msg-role{color:var(--text3)}
.msg-text{color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-word;font-size:13px}
.msg-text code{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:12px;color:var(--accent)}
.msg-text pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:8px 0}
.msg-text pre code{background:none;border:none;padding:0;color:var(--text);font-size:12px}
.msg-text strong{color:#fff;font-weight:600}
.msg-actions{display:flex;gap:6px;margin-top:6px;opacity:0;transition:opacity .15s}
.msg:hover .msg-actions{opacity:1}
.msg-act-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:11px;padding:2px 7px;transition:all .15s}
.msg-act-btn:hover{border-color:var(--border2);color:var(--text)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text3)}
.empty-big{font-family:var(--serif);font-style:italic;font-size:30px;color:var(--text3)}

/* Input */
.input-bar{padding:12px 18px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;outline:none;resize:none;min-height:44px;max-height:200px;line-height:1.6;transition:border .15s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text3)}
.btn-send{background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-family:var(--mono);font-size:13px;font-weight:600;padding:10px 16px;white-space:nowrap;transition:all .15s;flex-shrink:0;min-height:44px}
.btn-send:hover{background:#f0ff80}
.btn-send:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.input-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-family:var(--mono);font-size:11px;padding:2px 4px;transition:color .15s;display:flex;align-items:center;gap:3px}
.meta-btn:hover{color:var(--accent)}
.meta-btn.active{color:var(--accent)}
.tok-count{margin-left:auto;font-size:11px;color:var(--text3)}

.cursor{display:inline-block;width:7px;height:13px;background:var(--accent);border-radius:1px;margin-left:2px;animation:blink .9s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#toast{position:fixed;bottom:70px;right:16px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999}
#toast.show{opacity:1}

/* Mobile */
@media(max-width:640px){
  .sidebar{position:absolute;left:0;top:0;bottom:0;z-index:100;width:220px;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .sidebar.collapsed{width:220px;transform:translateX(-100%)}
  .key-wrap input{width:130px}
  .topbar{gap:6px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">OpenRoute</div>
  <div class="model-sel-wrap">
    <span class="lbl">Model:</span>
    <select class="model-sel" id="model-sel">
      <optgroup label="── Claude (Anthropic)">
        <option value="anthropic/claude-sonnet-4-5">Claude Sonnet 4.5</option>
        <option value="anthropic/claude-opus-4">Claude Opus 4</option>
        <option value="anthropic/claude-haiku-3-5">Claude Haiku 3.5</option>
      </optgroup>
      <optgroup label="── GPT (OpenAI)">
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="openai/o3-mini">o3 Mini</option>
      </optgroup>
      <optgroup label="── Gemini (Google)">
        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
        <option value="google/gemini-pro-1.5">Gemini 1.5 Pro</option>
      </optgroup>
      <optgroup label="── Open Source">
        <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
        <option value="mistralai/mistral-large">Mistral Large</option>
        <option value="deepseek/deepseek-r1">DeepSeek R1</option>
        <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
      </optgroup>
    </select>
  </div>
  <div class="key-wrap">
    <input type="password" id="api-key" placeholder="sk-or-v1-..." autocomplete="off"/>
    <button class="bico" onclick="toggleKeyVis()" title="Tampilkan key">👁</button>
    <button class="bico" onclick="saveKey()" title="Simpan key">💾</button>
  </div>
  <button class="bico" onclick="toggleSidebar()" title="Toggle sidebar" id="sb-toggle">☰</button>
</div>

<div class="shell">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <span class="sb-title">Chat</span>
      <button class="btn-new" onclick="newConv()">+ Baru</button>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <div class="chat-main">
    <div class="sysprompt-bar" id="sysprompt-bar">
      <div class="sys-lbl">System Prompt</div>
      <textarea id="system-prompt" placeholder="Instruksi sistem (opsional)..."></textarea>
    </div>
    <div class="params-panel" id="params-panel">
      <div class="pg"><span class="lbl">Temp:</span><input class="param-input" type="number" id="p-temp" value="0.7" min="0" max="2" step="0.1"/></div>
      <div class="pg"><span class="lbl">Max tokens:</span><input class="param-input" type="number" id="p-maxtok" value="2048" min="100" max="32000" step="100"/></div>
      <div class="pg"><span class="lbl">Top P:</span><input class="param-input" type="number" id="p-topp" value="1" min="0" max="1" step="0.05"/></div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-big">Mulai percakapan</div>
        <div style="font-size:12px">Masukkan API key → pilih model → ketik pesan</div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ketik pesan... (Enter kirim, Shift+Enter baris baru)" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMsg()">Kirim ↑</button>
      </div>
      <div class="input-meta">
        <button class="meta-btn" onclick="toggleSys()" id="sys-btn">⚙ System</button>
        <button class="meta-btn" onclick="toggleParams()" id="params-btn">🎛 Params</button>
        <button class="meta-btn" onclick="clearConv()">🗑 Hapus</button>
        <button class="meta-btn" onclick="exportConv()">📄 Export</button>
        <span class="tok-count" id="tok-count"></span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── STATE ── */
let convs = JSON.parse(localStorage.getItem('or_convs_v2') || '[]');
let activeId = null;
let streaming = false;

const getConv = id => convs.find(c => c.id === id);
const getActive = () => getConv(activeId);
const saveConvs = () => localStorage.setItem('or_convs_v2', JSON.stringify(convs));

function newConv() {
  const id = 'c' + Date.now();
  convs.unshift({ id, title: 'Percakapan baru', messages: [], ts: Date.now() });
  saveConvs(); setActive(id); renderSidebar();
}

function setActive(id) {
  activeId = id; renderSidebar(); renderMessages();
  const conv = getActive();
  if (conv) updateTok(conv);
}

function delConv(id) {
  convs = convs.filter(c => c.id !== id); saveConvs();
  if (activeId === id) {
    if (convs.length) setActive(convs[0].id); else newConv();
  }
  renderSidebar(); renderMessages();
}

/* ── SIDEBAR ── */
function renderSidebar() {
  const el = document.getElementById('conv-list');
  if (!convs.length) { el.innerHTML = '<div style="color:var(--text3);font-size:11px;padding:10px">Belum ada percakapan</div>'; return; }
  el.innerHTML = convs.map(c => `
    <div class="conv-item${c.id===activeId?' active':''}" onclick="setActive('${c.id}')">
      <span style="overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${esc(c.title)}</span>
      <button class="conv-del" onclick="event.stopPropagation();delConv('${c.id}')" title="Hapus">✕</button>
    </div>`).join('');
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 640) {
    sb.classList.toggle('open');
    sb.classList.toggle('collapsed', !sb.classList.contains('open'));
  } else {
    sb.classList.toggle('collapsed');
  }
}

/* ── MESSAGES ── */
function renderMessages() {
  const el = document.getElementById('messages');
  const conv = getActive();
  const empty = document.getElementById('empty-state');
  if (!conv || !conv.messages.length) {
    el.innerHTML = ''; empty.style.display = ''; el.appendChild(empty); return;
  }
  empty.style.display = 'none';
  el.innerHTML = conv.messages.map((m, i) => buildMsg(m, i)).join('');
  el.scrollTop = el.scrollHeight;
}

function buildMsg(m, idx) {
  const isUser = m.role === 'user';
  return `<div class="msg ${m.role}">
    <div class="msg-av">${isUser ? '👤' : '🤖'}</div>
    <div class="msg-body">
      <div class="msg-role">${isUser ? 'Kamu' : 'Asisten'}</div>
      <div class="msg-text">${fmt(m.content || '')}</div>
      <div class="msg-actions">
        <button class="msg-act-btn" onclick="copyMsg(${idx})">Salin</button>
        ${!isUser ? `<button class="msg-act-btn" onclick="regenMsg()">Ulangi</button>` : ''}
      </div>
    </div>
  </div>`;
}

function fmt(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── API KEY ── */
function loadKey() {
  const k = localStorage.getItem('or_key') || '';
  document.getElementById('api-key').value = k;
  if (k) document.getElementById('api-key').classList.add('valid');
}
function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) { toast('Masukkan API key dulu'); return; }
  localStorage.setItem('or_key', k);
  const inp = document.getElementById('api-key');
  inp.classList.add('valid'); inp.classList.remove('invalid');
  toast('API key disimpan ✓');
}
function toggleKeyVis() {
  const inp = document.getElementById('api-key');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function getKey() { return document.getElementById('api-key').value.trim() || localStorage.getItem('or_key') || ''; }

/* ── SEND ── */
async function sendMsg() {
  if (streaming) return;
  const key = getKey();
  if (!key) { toast('Masukkan API key OpenRouter dulu!'); return; }
  const inp = document.getElementById('user-input');
  const content = inp.value.trim(); if (!content) return;
  if (!activeId) newConv();
  const conv = getActive();
  conv.messages.push({ role: 'user', content });
  if (conv.title === 'Percakapan baru') conv.title = content.slice(0, 38) + (content.length > 38 ? '…' : '');
  saveConvs(); inp.value = ''; autoResize(inp);
  renderMessages(); renderSidebar(); await doStream(conv, key);
}

async function regenMsg() {
  const conv = getActive(); if (!conv || conv.messages.length < 2) return;
  if (conv.messages[conv.messages.length-1].role === 'assistant') conv.messages.pop();
  saveConvs(); renderMessages(); await doStream(conv, getKey());
}

async function doStream(conv, key) {
  const model = document.getElementById('model-sel').value;
  const sys = document.getElementById('system-prompt').value.trim();
  const temp = parseFloat(document.getElementById('p-temp').value) || 0.7;
  const maxTok = parseInt(document.getElementById('p-maxtok').value) || 2048;
  const topP = parseFloat(document.getElementById('p-topp').value) || 1;
  const msgs = [];
  if (sys) msgs.push({ role: 'system', content: sys });
  conv.messages.forEach(m => msgs.push({ role: m.role, content: m.content }));

  // Hide empty state safely
  const emptyEl = document.getElementById('empty-state');
  if (emptyEl) emptyEl.style.display = 'none';

  // Append streaming placeholder
  const el = document.getElementById('messages');
  // Remove old stext if any (prevent duplicate id)
  const oldStext = document.getElementById('stext');
  if (oldStext) oldStext.closest('.msg')?.remove();

  const ph = document.createElement('div');
  ph.className = 'msg assistant';
  ph.innerHTML = `<div class="msg-av">🤖</div><div class="msg-body"><div class="msg-role">Asisten</div><div class="msg-text" id="stext"><span class="cursor"></span></div></div>`;
  el.appendChild(ph); el.scrollTop = 9999;

  streaming = true;
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '...';

  let full = '';
  try {
    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + key,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.href,
        'X-Title': 'OpenRoute Chat'
      },
      body: JSON.stringify({ model, messages: msgs, temperature: temp, max_tokens: maxTok, top_p: topP, stream: true })
    });

    if (!resp.ok) {
      let errMsg = resp.statusText;
      try { const errJson = await resp.json(); errMsg = errJson?.error?.message || errJson?.message || errMsg; } catch(e) {}
      throw new Error(`${resp.status} — ${errMsg}`);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      const chunk = dec.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content || '';
          full += delta;
          const stext = document.getElementById('stext');
          if (stext) { stext.innerHTML = fmt(full) + '<span class="cursor"></span>'; el.scrollTop = 9999; }
        } catch(e) {}
      }
    }

    const stext = document.getElementById('stext');
    if (stext) stext.innerHTML = fmt(full);

    if (!full) throw new Error('Model tidak mengembalikan respons. Coba model lain atau cek kredit OpenRouter.');

    conv.messages.push({ role: 'assistant', content: full });
    saveConvs(); updateTok(conv);

  } catch(err) {
    const errMsg = err.message || 'Unknown error';
    const stext = document.getElementById('stext');
    if (stext) stext.innerHTML = `<span style="color:#f87171">⚠ ${esc(errMsg)}</span>`;
    toast('Error: ' + errMsg.slice(0, 80));
    console.error('OpenRouter error:', err);
    if (errMsg.includes('401') || errMsg.includes('API key')) {
      document.getElementById('api-key').classList.add('invalid');
      document.getElementById('api-key').classList.remove('valid');
    }
  }

  streaming = false; btn.disabled = false; btn.textContent = 'Kirim ↑';
}

/* ── UTILS ── */
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
function toggleSys() { document.getElementById('sysprompt-bar').classList.toggle('open'); document.getElementById('sys-btn').classList.toggle('active'); }
function toggleParams() { document.getElementById('params-panel').classList.toggle('open'); document.getElementById('params-btn').classList.toggle('active'); }
function clearConv() {
  const c = getActive(); if (!c) return;
  if (!confirm('Hapus semua pesan?')) return;
  c.messages = []; c.title = 'Percakapan baru'; saveConvs(); renderMessages(); renderSidebar();
}
function copyMsg(idx) {
  const c = getActive(); if (!c) return;
  navigator.clipboard.writeText(c.messages[idx]?.content || '').then(() => toast('Disalin!')).catch(() => toast('Gagal menyalin'));
}
function exportConv() {
  const c = getActive(); if (!c || !c.messages.length) { toast('Tidak ada pesan'); return; }
  const txt = c.messages.map(m => `[${m.role.toUpperCase()}]\n${m.content}`).join('\n\n---\n\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = `chat-${Date.now()}.txt`; a.click(); toast('Diekspor!');
}
function updateTok(conv) {
  const approx = conv.messages.reduce((a, m) => a + Math.ceil((m.content || '').length / 4), 0);
  document.getElementById('tok-count').textContent = approx > 0 ? `~${approx.toLocaleString()} tokens` : '';
}
let toastT;
function toast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── INIT ── */
loadKey();
if (!convs.length) newConv();
else { activeId = convs[0].id; setActive(activeId); }
renderSidebar();
</script>
</body>
</html>
